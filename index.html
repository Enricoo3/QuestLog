<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuestLog</title>
    <link rel="stylesheet" href="styles.css?v=11" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <div class="brand">
          <img class="brand-icon" src="assets/questlog-ql-logo.png?v=7" alt="" aria-hidden="true" />
          <span class="brand-name" aria-label="QuestLog">
            <span class="brand-gold">Q</span>
            <span class="brand-gold">U</span>
            <span class="brand-gold">E</span>
            <span class="brand-gold">S</span>
            <span class="brand-gold">T</span>
            <span class="brand-blue">L</span>
            <span class="brand-blue">O</span>
            <span class="brand-blue">G</span>
          </span>
        </div>

        <section class="summary-strip" aria-label="Resumo da biblioteca">
          <div>
            <strong id="stat-playing">0</strong>
            <span>jogando</span>
          </div>
          <div>
            <strong id="stat-completed">0</strong>
            <span>jogos zerados</span>
          </div>
          <div>
            <strong id="stat-hours">0h</strong>
            <span>registradas</span>
          </div>
        </section>

        <button class="primary-action" id="new-game-button" type="button">Adicionar jogo</button>
      </header>

      <section class="toolbar" aria-label="Busca e ordenacao">
        <label class="search-box">
          <span>Buscar</span>
          <input id="search-input" type="search" placeholder="Nome, plataforma, notas..." />
        </label>
        <label>
          <span>Ordenar</span>
          <select id="sort-select">
            <option value="updated">Atualizados recentemente</option>
            <option value="progress">Mais perto de zerar</option>
            <option value="hours">Mais horas jogadas</option>
            <option value="title">Titulo</option>
          </select>
        </label>
      </section>

      <section class="library-panel" aria-label="Prateleiras de jogos por status">
        <div id="status-shelves" aria-live="polite"></div>
      </section>
    </main>

    <dialog id="game-dialog">
      <form id="game-form" method="dialog">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Registro manual</p>
            <h3 id="dialog-title">Adicionar jogo</h3>
          </div>
          <button class="icon-button" value="cancel" type="button" id="close-dialog-button" aria-label="Fechar">x</button>
        </div>

        <input type="hidden" id="game-id" />
        <input type="hidden" id="cover-data-input" />

        <div class="form-grid">
          <label>
            <span>Titulo</span>
            <input id="title-input" required maxlength="90" />
          </label>
          <label>
            <span>Plataforma</span>
            <input id="platform-input" maxlength="50" placeholder="Steam, PS5, Switch..." />
          </label>
          <label>
            <span>Status</span>
            <select id="status-input">
              <option value="playing">Jogando</option>
              <option value="paused">Pausado</option>
              <option value="completed">Finalizado</option>
              <option value="wishlist">Quero Jogar</option>
              <option value="abandoned">Abandonado</option>
            </select>
          </label>
          <label>
            <span>Horas jogadas</span>
            <input id="hours-input" type="number" min="0" step="0.1" value="0" />
          </label>
          <label>
            <span>Estimativa historia (h)</span>
            <input id="story-estimate-input" type="number" min="0" step="0.5" value="0" />
          </label>
          <label>
            <span>Capa do jogo</span>
            <input id="cover-input" type="file" accept="image/*" />
          </label>
          <label class="wide">
            <span>Notas</span>
            <textarea id="notes-input" rows="4" placeholder="Build, escolhas, motivo da pausa, lembretes sobre a campanha..."></textarea>
          </label>
        </div>

        <div class="modal-actions">
          <button class="secondary-action" type="button" id="delete-game-button">Excluir</button>
          <button class="primary-action" type="submit">Salvar</button>
        </div>
      </form>
    </dialog>

    <dialog id="detail-dialog" class="detail-dialog">
      <div class="detail-sheet">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Ficha do jogo</p>
            <h3 id="detail-dialog-title">Detalhes</h3>
          </div>
          <button class="icon-button" type="button" id="close-detail-button" aria-label="Fechar">x</button>
        </div>
        <div id="detail-content"></div>
      </div>
    </dialog>

    <dialog id="progress-dialog" class="progress-dialog">
      <form id="progress-form" method="dialog">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Atualizar progresso</p>
            <h3 id="progress-dialog-title">Horas totais</h3>
          </div>
          <button class="icon-button" type="button" id="close-progress-button" aria-label="Fechar">x</button>
        </div>

        <input type="hidden" id="progress-game-id" />

        <label class="progress-field">
          <span>Horas totais atuais</span>
          <input id="progress-hours-input" type="number" min="0" step="0.1" />
        </label>

        <p class="meta">Use o total atual do jogo, como aparece na Steam. Ex: 14,3 horas.</p>

        <div class="modal-actions">
          <button class="secondary-action" type="button" id="cancel-progress-button">Cancelar</button>
          <button class="primary-action" type="submit">Atualizar</button>
        </div>
      </form>
    </dialog>

    <script src="app.js?v=12"></script>
  </body>
</html>
